name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            rust:
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '**/*.rs'
              - '.github/workflows/ci.yml'
            workflows:
              - '.github/workflows/**'

  build-rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/build-rust.yml@4aef3115afe05a19785b3e14970ecd4f400cc457

  lint-rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/static-analysis-rust.yml@4aef3115afe05a19785b3e14970ecd4f400cc457

  test-rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/tests-rust.yml@4aef3115afe05a19785b3e14970ecd4f400cc457
    with:
      enable-benchmarks: true

  lint-actions:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/static-analysis-github-actions.yml@4aef3115afe05a19785b3e14970ecd4f400cc457

  ci:
    if: always()
    needs: [build-rust, lint-rust, test-rust, lint-actions]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks passed
        env:
          RESULTS: ${{ toJson(needs.*.result) }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            echo "One or more required checks failed"
            exit 1
          fi
