name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect changed paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            rust:
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '**/*.rs'
              - '.github/workflows/ci.yml'
            workflows:
              - '.github/workflows/**'

  build-rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/build-rust.yml@16364121c482897e29680101ea22b8a3ea472c25

  lint-rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/static-analysis-rust.yml@16364121c482897e29680101ea22b8a3ea472c25

  test-rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/tests-rust.yml@16364121c482897e29680101ea22b8a3ea472c25
    with:
      enable-benchmarks: true

  lint-actions:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/static-analysis-github-actions.yml@16364121c482897e29680101ea22b8a3ea472c25

  ci:
    if: always()
    needs: [build-rust, lint-rust, test-rust, lint-actions]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks passed
        env:
          RESULTS: ${{ toJson(needs.*.result) }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            echo "One or more required checks failed"
            exit 1
          fi
